    - generic [ref=e96]:
      - paragraph [ref=e97]: Dataset Story
      - heading "How Detection Bias Shapes Discovery" [level=2] [ref=e98]
      - paragraph [ref=e99]: "This project uses NASA Exoplanet Archive Kepler candidate records. Each row is a candidate signal from starlight dips, not a direct telescope image of a planet. The core story is simple: easier signals get found first."
      - generic [ref=e100]:
        - article [ref=e101]:
          - heading "Source" [level=3] [ref=e102]
          - paragraph [ref=e103]: Kepler monitored stellar brightness over time. The archive stores KOI records with derived parameters including orbital period, transit depth, transit duration, stellar temperature, and planet radius estimates.
        - article [ref=e104]:
          - heading "What A Row Means" [level=3] [ref=e105]
          - paragraph [ref=e106]: A single KOI row describes one potential exoplanet signal around one host star. Labels like confirmed, candidate, and false positive are confidence checkpoints, not final truth for every signal.
        - article [ref=e107]:
          - heading "Core Story" [level=3] [ref=e108]
          - paragraph [ref=e109]: "The visualization highlights detectability bias: short-period, deeper transits are easier to detect, so they appear more often and with stronger confidence in exploratory AI predictions."
        - article [ref=e110]:
          - heading "How To Read This App" [level=3] [ref=e111]
          - paragraph [ref=e112]: Start in Star Select for sample-level patterns, inspect one target in Transit View, then open Signal Story to see detectability, reliability, and follow-up priority. Draw Simulator lets you test how signal shape changes discovery outcomes.
      - paragraph [ref=e113]: "Scientific note: these views are educational and exploratory. They should support understanding, not replace peer-reviewed validation pipelines."
      - button "Continue to Star Select" [ref=e115] [cursor=pointer]
