    - generic [ref=e90]:
      - paragraph [ref=e91]: Dataset Story
      - heading "How Detection Bias Shapes Discovery" [level=2] [ref=e92]
      - paragraph [ref=e93]: "This project uses NASA Exoplanet Archive Kepler candidate records. Each row is a candidate signal from starlight dips, not a direct telescope image of a planet. The core story is simple: easier signals get found first."
      - generic [ref=e94]:
        - article [ref=e95]:
          - heading "Source" [level=3] [ref=e96]
          - paragraph [ref=e97]: Kepler monitored stellar brightness over time. The archive stores KOI records with derived parameters including orbital period, transit depth, transit duration, stellar temperature, and planet radius estimates.
        - article [ref=e98]:
          - heading "What A Row Means" [level=3] [ref=e99]
          - paragraph [ref=e100]: A single KOI row describes one potential exoplanet signal around one host star. Labels like confirmed, candidate, and false positive are confidence checkpoints, not final truth for every signal.
        - article [ref=e101]:
          - heading "Core Story" [level=3] [ref=e102]
          - paragraph [ref=e103]: "The visualization highlights detectability bias: short-period, deeper transits are easier to detect, so they appear more often and with stronger confidence in exploratory AI predictions."
        - article [ref=e104]:
          - heading "How To Read This App" [level=3] [ref=e105]
          - paragraph [ref=e106]: Start in Star Select for sample-level patterns, inspect one target in Transit View, then open Signal Story for a plain-language interpretation of why the signal looks strong or uncertain.
      - paragraph [ref=e107]: "Scientific note: these views are educational and exploratory. They should support understanding, not replace peer-reviewed validation pipelines."
      - button "Continue to Star Select" [ref=e109] [cursor=pointer]
